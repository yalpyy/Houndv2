<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HOUND - Discovery Locked</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "navy": "#1e293b",
                        "ivory": "#fdfcfb",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "neutral-soft": "#e5e1e0",
                        "neutral-deep": "#3d2d25",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .blur-bg {
            filter: blur(20px);
            transform: scale(1.1);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(34, 22, 16, 0.9);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-ivory dark:bg-background-dark font-display text-navy dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 z-10 border-b border-primary/5 bg-ivory/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined text-navy dark:text-neutral-soft">menu</span>
</div>
<h1 class="text-xl font-bold tracking-[0.25em] uppercase text-navy dark:text-slate-100">HOUND</h1>
<div class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined text-navy dark:text-neutral-soft" style="font-variation-settings: 'FILL' 1">notifications</span>
</div>
</header>
<!-- Main Content -->
<main class="relative flex-1 flex flex-col items-center justify-center p-6">
<!-- Blurred Background Mockup representing the locked content -->
<div class="absolute inset-0 blur-bg flex flex-col items-center justify-center gap-8 opacity-20 pointer-events-none">
<div class="w-80 h-[500px] bg-neutral-soft dark:bg-neutral-deep rounded-3xl shadow-xl"></div>
</div>
<!-- Lock Overlay Card -->
<div class="z-20 w-full max-w-[340px] glass-panel p-10 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white/50 flex flex-col items-center text-center">
<!-- Central Visual -->
<div class="mb-8 flex size-24 items-center justify-center rounded-full bg-primary/10 dark:bg-primary/20">
<div class="flex size-16 items-center justify-center rounded-full bg-white dark:bg-navy shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">lock</span>
</div>
</div>
<!-- Title -->
<h2 class="text-2xl font-bold mb-4 tracking-widest text-navy dark:text-slate-100 uppercase">
                KEŞFET
            </h2>
<!-- Description -->
<p class="text-navy/70 dark:text-slate-400 mb-10 leading-relaxed text-sm px-2">
                Köpeğinizi eklemeden HOUND’u keşfedemezsiniz. Özel kulübümüzün ayrıcalıklarını korumak için lütfen önce bir profil oluşturun.
            </p>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4.5 px-6 rounded-2xl shadow-xl shadow-primary/30 transition-all active:scale-[0.97] text-base">
                Köpek Ekle
            </button>
<!-- Secondary Link -->
<button class="mt-8 text-[10px] uppercase tracking-[0.15em] font-bold text-primary/80 hover:text-primary transition-colors">
                ÜYELİK HAKKINDA DAHA FAZLA BİLGİ
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="flex border-t border-primary/5 bg-ivory dark:bg-background-dark px-8 pb-8 pt-4 justify-between items-center z-10">
<a class="flex flex-col items-center gap-1.5 text-navy/30 dark:text-neutral-soft/30" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[9px] font-bold uppercase tracking-wider">ANA SAYFA</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">search</span>
<span class="text-[9px] font-bold uppercase tracking-wider">KEŞFET</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-navy/30 dark:text-neutral-soft/30" href="#">
<span class="material-symbols-outlined text-2xl">chat_bubble</span>
<span class="text-[9px] font-bold uppercase tracking-wider">MESAJLAR</span>
</a>
<a class="flex flex-col items-center gap-1.5 text-navy/30 dark:text-neutral-soft/30" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-[9px] font-bold uppercase tracking-wider">PROFİL</span>
</a>
</nav>
</div>
</body></html>
